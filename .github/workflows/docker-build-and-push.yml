name: Build and Push Docker Image with Repository Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag from the repository to use for the Docker image'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    runs-on: macos-latest  # Use macOS Apple Silicon runner

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Validate the provided tag
      - name: Validate tag
        id: validate_tag
        run: |
          # Fetch all tags from the repository
          git fetch --tags
          TAG_EXISTS=$(git tag -l "${{ inputs.tag }}")
          if [ -z "$TAG_EXISTS" ]; then
            echo "Error: The tag '${{ inputs.tag }}' does not exist in the repository."
            exit 1
          fi
        shell: bash

      # Step 3: Install Docker
      - name: Install Docker
        run: |
          brew install --cask docker
          open /Applications/Docker.app
          sleep 10  # Wait for Docker to start

      # Step 4: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 5: Build the Docker image
      - name: Build Docker image
        run: |
          docker build --platform linux/arm64 -t darlhz/cdk-mintd:\${{ inputs.tag }} .

      # Step 6: Push the Docker image to Docker Hub
      - name: Push Docker image
        run: |
          docker push darlhz/cdk-mintd:\${{ inputs.tag }}
